<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasil Drop</title>
    <link rel="stylesheet" href="/css/styles.css?v=2">
</head>
<body>
<div th:replace="~{fragments :: topbar}"></div>

<main class="market-layout">
    <aside class="filters">
        <div class="filter-head">
            <strong>Filtros</strong>
            <a href="/">Limpar</a>
        </div>
        <form action="/" method="get">
            <label for="category">Categoria</label>
            <select id="category" name="category">
                <option value="">Todas</option>
                <option th:each="category : ${categories}"
                        th:value="${category}"
                        th:selected="${category == selectedCategory}"
                        th:text="${category.label}">Camisas</option>
            </select>
            <button class="primary" type="submit">Aplicar</button>
        </form>
    </aside>

    <section class="product-area">
        <div class="hero-strip">
            <div>
                <p>Copa 2026</p>
                <h1>Chuteiras e artigos esportivos do Brasil</h1>
            </div>
            <a href="/cart">Ver carrinho</a>
        </div>

        <div class="product-grid">
            <article class="product-card" th:each="product : ${products}">
                <div class="product-media">
                    <img th:src="${product.imageUrl}" th:alt="${product.name}">
                    <form action="/wishlist/toggle" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button class="favorite" type="submit"
                                th:classappend="${shopping.isFavorite(product.id)} ? ' active'"
                                th:text="${shopping.isFavorite(product.id)} ? '♥' : '♡'">♡</button>
                    </form>
                </div>
                <div class="product-info">
                    <p class="brand-name" th:text="${product.brand}">Nike</p>
                    <h2 th:text="${product.name}">Camisa Brasil</h2>
                    <p th:text="${product.description}">Descricao</p>
                    <div class="product-footer">
                        <strong th:text="${#numbers.formatCurrency(product.price)}">R$ 0,00</strong>
                        <form action="/cart/add" method="post">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <button type="submit">Adicionar</button>
                        </form>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>
<div th:replace="~{fragments :: copaAssistant}"></div>
</body>
</html>
