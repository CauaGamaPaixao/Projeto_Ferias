<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos - Brasil Drop</title>
    <link rel="stylesheet" href="/css/styles.css?v=2">
</head>
<body>
<div th:replace="~{fragments :: topbar}"></div>
<main class="content">
    <h1>Favoritos</h1>
    <p class="empty" th:if="${products.isEmpty()}">Nenhum produto favoritado ainda.</p>
    <div class="product-grid compact">
        <article class="product-card" th:each="product : ${products}">
            <div class="product-media">
                <img th:src="${product.imageUrl}" th:alt="${product.name}">
            </div>
            <div class="product-info">
                <p class="brand-name" th:text="${product.brand}">Nike</p>
                <h2 th:text="${product.name}">Produto</h2>
                <div class="product-footer">
                    <strong th:text="${#numbers.formatCurrency(product.price)}">R$ 0,00</strong>
                    <form action="/cart/add" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button type="submit">Adicionar</button>
                    </form>
                </div>
            </div>
        </article>
    </div>
</main>
</body>
</html>
